<!doctype html>
<html>
  <head>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Danny's Game Review | Home</title>
    <meta name="description" content="Personal Video Game Review and Recommendations" />
    <link rel="stylesheet" href="style.css" />
    <script type="text/javascript" src="scripts.js"></script>
  </head>

  <body>
    <header class="main-header">
      <h1 class="title">BIG BYTE REVIEW.</h1>
      <p class = "subtitle">Unfiltered and unpaid reviews by Daniel</p>
    </header>
    <div id = "controls">
      <input type = "text" id = "search-bar" placeholder = "Search games...">
      <select id = "sort-select">
        <option value = "default">Sort By</option>
        <option value = "rating-high">Rating: High to Low</option>
        <option value = "rating-low">Rating: Low to High</option>
        <option value = "difficulty-high">Difficulty: High to Low</option>
        <option value = "difficulty-low">Difficulty: Low to High</option>
        <option value = "release-latest">Release Year: Latest to Oldest</option>
        <option value = "release-oldest">Release Year: Oldest to Latest</option>
      </select>
      <select id = "genre-filter">
        <option value = "all">All Genres</option>
        <option value = "RPG">RPG</option>
        <option value = "Survival Horror">Survival Horror</option>
        <option value = "Adventure">Adventure</option>
        <option value = "Roguelike">Roguelike</option>
        <option value = "Soulslike">Soulslike</option>
        <option value = "First-person shooter">First-person shooter</option>
        <option value = "Fighting">Fighting</option>
        <option value = "Action">Action</option>
      </select>
      <button id="mustplay-filter">⭐ Must Play Only</button>
      <p id = "game-count"></p>
      </div>
    <div id="card-container"></div>
    <div class="card" style="display: none">
      <div class="card-content">
        <h2></h2>
        <img src="" alt="Game Cover" />
        <ul>
          <li>Bullet Point 1</li>
          <li>Bullet Point 2</li>
          <li>Bullet Point 3</li>
        </ul>
      </div>
    </div>
  </body>
</html>
